# ──────────────────────────────────────────────────────────────
# TEMPLATE — DO NOT commit real values.
# Fill in base64-encoded values, then apply:
#   kubectl apply -f k8s/secrets.yaml -n onetake
#
# Encode a value:
#   echo -n "your-secret-value" | base64
# ──────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: onetake-secrets
  namespace: onetake
type: Opaque
data:
  # Neon Postgres — postgresql://user:pass@host/dbname?sslmode=require
  DATABASE_URL: <base64_encoded_value>

  # Clerk Auth
  CLERK_SECRET_KEY: <base64_encoded_value>
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: <base64_encoded_value>

  # OpenRouter API
  OPENROUTER_API_KEY: <base64_encoded_value>

  # Vercel Blob
  BLOB_READ_WRITE_TOKEN: <base64_encoded_value>

  # Microsoft Teams Webhook
  TEAMS_WEBHOOK_URL: <base64_encoded_value>
